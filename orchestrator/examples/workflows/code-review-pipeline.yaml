name: code-review-pipeline
description: Automated code review workflow with LLM analysis
nodes:
  - name: analyze_diff
    type: llm_call
    config:
      model: "mlx-community/Qwen3.5-35B-A3B-4bit"
      endpoint: "http://localhost:11434/v1"
      system_prompt_resource: prompt://dryvist/applications/nix-ai-code-review-analysis-example
    description: "Analyze code diff for issues"
  - name: categorize_issues
    type: llm_call
    config:
      model: "mlx-community/Qwen3.5-35B-A3B-4bit"
      endpoint: "http://localhost:11434/v1"
      system_prompt_resource: prompt://dryvist/applications/nix-ai-code-review-categorization-example
    description: "Categorize issues by severity"
  - name: check_critical
    type: conditional
    config:
      condition_key: "has_critical"
      true_target: "request_human_review"
      false_target: "generate_report"
    description: "Route based on critical issues"
  - name: request_human_review
    type: human_input
    config:
      prompt: "Critical issues found. Please review and approve."
    description: "Request human review for critical issues"
  - name: generate_report
    type: tool_exec
    config:
      command: "echo"
      args: ["Review complete"]
    description: "Generate final review report"
edges:
  - source: analyze_diff
    target: categorize_issues
  - source: categorize_issues
    target: check_critical
  # Note: request_human_review has no outgoing edge. human_input nodes are always
  # terminal — the engine routes them to END so the caller receives a state with
  # pending_human_input=True. Resume the workflow (supplying human feedback) to
  # continue to generate_report.
entry_point: analyze_diff
