name: vault-search
description: Search an Obsidian vault for relevant notes and knowledge using semantic search
version: "1.0.0"
tags:
  - search
  - knowledge
  - obsidian
  - rag

model:
  endpoint: http://127.0.0.1:11434/v1
  size: medium
  temperature: 0.3
  max_tokens: 4096
  json_mode: false

system_prompt_resource: prompt://dryvist/applications/nix-ai-vault-search-example

output_format: markdown

resources:
  max_memory_gb: 15.0
  max_duration_seconds: 30
  max_input_tokens: 8192

examples:
  - "Find notes about project X"
  - "What do I know about deployment strategies?"
  - "Search for meeting notes with John"
  - "Find information about the auth migration"
