name: structured-extract
description: Extract structured data from unstructured text into JSON format
version: "1.0.0"
tags:
  - extraction
  - json
  - structured
  - parsing

model:
  endpoint: http://127.0.0.1:11434/v1
  model: mlx-community/Qwen3.5-122B-A10B-4bit
  size: large
  temperature: 0.1
  max_tokens: 2048
  json_mode: true

system_prompt_resource: prompt://dryvist/applications/nix-ai-structured-extract-example

output_format: json

output_schema:
  type: object
  properties:
    entities:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
          type:
            type: string
            enum: [person, organization, project, technology]
          attributes:
            type: object
    relationships:
      type: array
      items:
        type: object
        properties:
          source:
            type: string
          target:
            type: string
          type:
            type: string

resources:
  max_memory_gb: 5.0
  max_duration_seconds: 30
  max_input_tokens: 4096

examples:
  - "Extract entities from this meeting note"
  - "Parse the people and companies mentioned here"
  - "Get structured data from this email"
  - "Extract action items from this transcript"
