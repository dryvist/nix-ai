# Custom package updates (source hash bumps via nix-update)
#
# Flake input updates (flake.lock) are handled by Renovate's nix manager,
# which creates individual PRs per input with auto-merge for trusted owners.
# See renovate.json5 and renovate-presets.json in JacobPEvans/.github.
#
# This workflow only handles nix-update for packages with pinned source hashes
# that Renovate cannot manage natively.
name: Update custom packages

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  update:
    name: Update custom packages
    # Self-hosted RunsOn runner — see terraform-runs-on/docs/migration-guide.md
    runs-on: "runs-on=${{ github.run_id }}/runner=2cpu-linux-x64"
    environment: automation
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.GH_APP_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Update gh-aw
        run: nix run nixpkgs#nix-update -- --flake gh-aw

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          sign-commits: true
          branch: chore/update-custom-packages
          delete-branch: true
          commit-message: "chore(deps): update custom packages"
          title: "chore(deps): update custom packages"
          body: |
            Automated update via nix-update.
          labels: dependencies
