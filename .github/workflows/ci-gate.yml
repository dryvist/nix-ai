# CI Gate - Conditional Required Checks
#
# FRAMEWORK: Merge Gatekeeper Pattern
# ====================================
# Solves: "Required checks that only run when relevant files change"
#
# Problem: GitHub branch protection only supports "always required" or "not required"
#          Path-filtered workflows that don't run = pending forever = blocks merge
#
# Solution: Single workflow that:
# 1. Always triggers on ALL PRs (no path filters at workflow level)
# 2. Detects which file categories changed
# 3. Calls reusable workflows conditionally (skipped = success)
# 4. Final "Merge Gate" job aggregates all results
#
# Branch Protection: Set ONLY "Merge Gate" as required check
#
# Adding New Checks:
# 1. Create reusable workflow: _your-check.yml with `on: workflow_call`
# 2. Add filter pattern under `changes.steps.filter.with.filters`
# 3. Add job that calls the reusable workflow with appropriate `if:` condition
# 4. Add job name to `gate.needs` array and `allowed-skips`

name: CI Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # ==========================================================================
  # CHANGE DETECTION
  # ==========================================================================
  # Fork-PR security guard:
  # nix-ai is a PUBLIC repository, so `pull_request` from fork branches
  # would otherwise execute fork-author-controlled code on our self-hosted
  # RunsOn runners (and the underlying AWS account). The `runs-on:` expression
  # routes same-repo PRs to RunsOn and falls back to `ubuntu-latest`
  # (github-hosted, ephemeral, sandboxed) for fork PRs. Reusable workflow
  # calls below carry the same expression through `runner_label`.
  # Pattern reference: runs-on.com/configuration/job-labels (Fork PRs).
  changes:
    name: Detect Changes
    runs-on: ${{ github.event.pull_request.head.repo.full_name == github.repository && format('runs-on={0}/runner=2cpu-linux-x64', github.run_id) || 'ubuntu-latest' }}
    permissions:
      contents: read
      pull-requests: read
    outputs:
      nix: ${{ steps.filter.outputs.nix }}
      markdown: ${{ steps.filter.outputs.markdown }}
      python: ${{ steps.filter.outputs.python }}
      is-deps-only: ${{ steps.detect-deps.outputs.is-deps-only }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            nix:
              - '**.nix'
              - 'flake.lock'
              - 'lib/**'
              - 'modules/**'
              - 'scripts/**'
            markdown:
              - '**.md'
              - '.markdownlint*'
            python:
              - 'mlx-server/**'
              - 'orchestrator/**'

      - name: Detect Dependency-Only Commits
        id: detect-deps
        env:
          AUTHOR: ${{ github.event.pull_request.user.login }}
          COMMIT_MSG: ${{ github.event.pull_request.title }}
        run: |
          # Skip nix-validate for dependency-only PRs:
          # - Renovate: author starts with jacobpevans-github-actions + title starts with chore(deps)
          #   (dual check because Renovate can be configured for non-dep tasks)
          # - Dependabot: author check alone (it exclusively creates dependency PRs)
          if [[ ("$AUTHOR" == "jacobpevans-github-actions"* && "$COMMIT_MSG" == chore\(deps\)*) || \
                "$AUTHOR" == "dependabot[bot]" ]]; then
            echo "is-deps-only=true" >> "$GITHUB_OUTPUT"
          else
            echo "is-deps-only=false" >> "$GITHUB_OUTPUT"
          fi

  # ==========================================================================
  # CONDITIONAL CHECKS (call reusable workflows)
  # Performance: Jobs run in parallel when conditions are met
  # Only dependency is 'changes' job, allowing max parallelization
  # ==========================================================================
  nix-validate:
    name: Nix Validate
    needs: changes
    if: needs.changes.outputs.nix == 'true' && needs.changes.outputs.is-deps-only != 'true'
    uses: dryvist/.github/.github/workflows/_nix-validate.yml@main
    with:
      # `nix flake check --all-systems` needs disk/RAM for darwin source
      # substitution; m7+c7 family with s3-cache fits.
      # Fork PRs fall back to ubuntu-latest (see header comment on `changes`).
      runner_label: ${{ github.event.pull_request.head.repo.full_name == github.repository && format('runs-on={0}/cpu=4/ram=16/family=m7+c7/extras=s3-cache', github.run_id) || 'ubuntu-latest' }}

  markdown-lint:
    name: Markdown Lint
    needs: changes
    if: needs.changes.outputs.markdown == 'true'
    uses: dryvist/.github/.github/workflows/_markdown-lint.yml@main
    with:
      runner_label: ${{ github.event.pull_request.head.repo.full_name == github.repository && format('runs-on={0}/runner=2cpu-linux-x64', github.run_id) || 'ubuntu-latest' }}

  file-size:
    name: File Size
    needs: changes
    if: needs.changes.outputs.nix == 'true' || needs.changes.outputs.markdown == 'true'
    uses: dryvist/.github/.github/workflows/_file-size.yml@main
    with:
      runner_label: ${{ github.event.pull_request.head.repo.full_name == github.repository && format('runs-on={0}/runner=2cpu-linux-x64', github.run_id) || 'ubuntu-latest' }}

  # Token-budgets AI-read prose via the shared tiktoken counter. Config lives in
  # .token-limits.yaml; pairs with file-size (the byte gate skips token-gated files).
  token-limits:
    name: Token Limits
    needs: changes
    if: needs.changes.outputs.markdown == 'true'
    uses: dryvist/.github/.github/workflows/_token-limits.yml@main
    with:
      runner_label: ${{ github.event.pull_request.head.repo.full_name == github.repository && format('runs-on={0}/runner=2cpu-linux-x64', github.run_id) || 'ubuntu-latest' }}

  python-security:
    name: Python Security
    needs: changes
    if: needs.changes.outputs.python == 'true'
    uses: dryvist/.github/.github/workflows/_python-security.yml@main
    with:
      python-dirs: 'mlx-server orchestrator'
      # MUST mirror osv-scanner.toml `[[IgnoredVulns]]`. Each ID is documented
      # there (rationale, tracking issue #812, `ignoreUntil` review date).
      # New advisories must be added to BOTH files in lockstep.
      #   PYSEC-2026-139, CVE-2025-3000, GHSA-rrmf-rvhw-rf47 — torch 2.10.0 chain.
      #   GHSA-p4gq-832x-fm9v — nltk 3.9.4 local file load.
      ignore-vulns: >-
        PYSEC-2026-139 CVE-2025-3000 GHSA-rrmf-rvhw-rf47 GHSA-p4gq-832x-fm9v
      runner_label: ${{ github.event.pull_request.head.repo.full_name == github.repository && format('runs-on={0}/runner=2cpu-linux-x64', github.run_id) || 'ubuntu-latest' }}

  osv-scan:
    name: OSV Scan
    needs: changes
    if: always()
    uses: dryvist/.github/.github/workflows/_osv-scan.yml@main
    with:
      runner_label: ${{ github.event.pull_request.head.repo.full_name == github.repository && format('runs-on={0}/runner=2cpu-linux-x64', github.run_id) || 'ubuntu-latest' }}

  # ==========================================================================
  # MERGE GATE - The ONLY required check in branch protection
  # ==========================================================================
  gate:
    name: Merge Gate
    needs: [changes, nix-validate, markdown-lint, file-size, token-limits, python-security, osv-scan]
    if: ${{ !cancelled() }}
    runs-on: ${{ github.event.pull_request.head.repo.full_name == github.repository && format('runs-on={0}/runner=2cpu-linux-x64', github.run_id) || 'ubuntu-latest' }}
    steps:
      - name: Check all results
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # release/v1
        with:
          allowed-skips: nix-validate, markdown-lint, file-size, token-limits, python-security
          jobs: ${{ toJSON(needs) }}
