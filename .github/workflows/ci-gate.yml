# CI Gate - Conditional Required Checks
#
# FRAMEWORK: Merge Gatekeeper Pattern
# ====================================
# Solves: "Required checks that only run when relevant files change"
#
# Problem: GitHub branch protection only supports "always required" or "not required"
#          Path-filtered workflows that don't run = pending forever = blocks merge
#
# Solution: Single workflow that:
# 1. Always triggers on ALL PRs (no path filters at workflow level)
# 2. Detects which file categories changed
# 3. Calls reusable workflows conditionally (skipped = success)
# 4. Final "Merge Gate" job aggregates all results
#
# Branch Protection: Set ONLY "Merge Gate" as required check
#
# Adding New Checks:
# 1. Create reusable workflow: _your-check.yml with `on: workflow_call`
# 2. Add filter pattern under `changes.steps.filter.with.filters`
# 3. Add job that calls the reusable workflow with appropriate `if:` condition
# 4. Add job name to `gate.needs` array and `allowed-skips`

name: CI Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # ==========================================================================
  # CHANGE DETECTION
  # ==========================================================================
  changes:
    name: Detect Changes
    # Self-hosted RunsOn runner (terraform-runs-on). docs/migration-guide.md
    # in JacobPEvans/terraform-runs-on documents the label format and rollback.
    runs-on: "runs-on=${{ github.run_id }}/runner=2cpu-linux-x64"
    permissions:
      contents: read
      pull-requests: read
    outputs:
      nix: ${{ steps.filter.outputs.nix }}
      markdown: ${{ steps.filter.outputs.markdown }}
      python: ${{ steps.filter.outputs.python }}
      is-deps-only: ${{ steps.detect-deps.outputs.is-deps-only }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            nix:
              - '**.nix'
              - 'flake.lock'
              - 'lib/**'
              - 'modules/**'
              - 'scripts/**'
            markdown:
              - '**.md'
              - '.markdownlint*'
            python:
              - 'mlx-server/**'
              - 'orchestrator/**'

      - name: Detect Dependency-Only Commits
        id: detect-deps
        env:
          AUTHOR: ${{ github.event.pull_request.user.login }}
          COMMIT_MSG: ${{ github.event.pull_request.title }}
        run: |
          # Skip nix-validate for dependency-only PRs:
          # - Renovate: author starts with jacobpevans-github-actions + title starts with chore(deps)
          #   (dual check because Renovate can be configured for non-dep tasks)
          # - Dependabot: author check alone (it exclusively creates dependency PRs)
          if [[ ("$AUTHOR" == "jacobpevans-github-actions"* && "$COMMIT_MSG" == chore\(deps\)*) || \
                "$AUTHOR" == "dependabot[bot]" ]]; then
            echo "is-deps-only=true" >> "$GITHUB_OUTPUT"
          else
            echo "is-deps-only=false" >> "$GITHUB_OUTPUT"
          fi

  # ==========================================================================
  # CONDITIONAL CHECKS (call reusable workflows)
  # Performance: Jobs run in parallel when conditions are met
  # Only dependency is 'changes' job, allowing max parallelization
  # ==========================================================================
  nix-validate:
    name: Nix Validate
    needs: changes
    if: needs.changes.outputs.nix == 'true' && needs.changes.outputs.is-deps-only != 'true'
    uses: JacobPEvans/.github/.github/workflows/_nix-validate.yml@main
    with:
      # `nix flake check --all-systems` needs disk/RAM for darwin source
      # substitution; m7+c7 family with s3-cache fits.
      runner_label: "runs-on=${{ github.run_id }}/cpu=4/ram=16/family=m7+c7/extras=s3-cache"

  markdown-lint:
    name: Markdown Lint
    needs: changes
    if: needs.changes.outputs.markdown == 'true'
    uses: JacobPEvans/.github/.github/workflows/_markdown-lint.yml@main
    with:
      runner_label: "runs-on=${{ github.run_id }}/runner=2cpu-linux-x64"

  file-size:
    name: File Size
    needs: changes
    if: needs.changes.outputs.nix == 'true' || needs.changes.outputs.markdown == 'true'
    uses: JacobPEvans/.github/.github/workflows/_file-size.yml@main
    with:
      runner_label: "runs-on=${{ github.run_id }}/runner=2cpu-linux-x64"

  python-security:
    name: Python Security
    needs: changes
    if: needs.changes.outputs.python == 'true'
    uses: JacobPEvans/.github/.github/workflows/_python-security.yml@main
    with:
      python-dirs: 'mlx-server orchestrator'
      runner_label: "runs-on=${{ github.run_id }}/runner=2cpu-linux-x64"

  osv-scan:
    name: OSV Scan
    needs: changes
    if: always()
    uses: JacobPEvans/.github/.github/workflows/_osv-scan.yml@main
    with:
      runner_label: "runs-on=${{ github.run_id }}/runner=2cpu-linux-x64"

  # ==========================================================================
  # MERGE GATE - The ONLY required check in branch protection
  # ==========================================================================
  gate:
    name: Merge Gate
    needs: [changes, nix-validate, markdown-lint, file-size, python-security, osv-scan]
    if: ${{ !cancelled() }}
    runs-on: "runs-on=${{ github.run_id }}/runner=2cpu-linux-x64"
    steps:
      - name: Check all results
        uses: re-actors/alls-green@release/v1
        with:
          allowed-skips: nix-validate, markdown-lint, file-size, python-security
          jobs: ${{ toJSON(needs) }}
