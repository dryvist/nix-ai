repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # gh-aw regenerates .lock.yml workflows and .github/aw/imports/ verbatim
      # from upstream sources; the whitespace fixers must not rewrite generated
      # artifacts or every repo-wide run (pre-push) modifies them and blocks
      # the push. Scoped to these two hooks only — zizmor etc. still scan them.
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
        exclude: ^\.github/(workflows/.*\.lock\.yml|aw/imports/)
      - id: end-of-file-fixer
        exclude: ^\.github/(workflows/.*\.lock\.yml|aw/imports/)
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.21.0
    hooks:
      - id: markdownlint-cli2
        files: \.md$
        # CHANGELOG.md is auto-generated by release-please; its commit-hash URLs produce
        # unavoidable MD013 violations and its per-release section headings trigger MD024.
        exclude: ^CHANGELOG\.md$

  - repo: local
    hooks:
      - id: nix-fmt-check
        name: Nix formatting (nixfmt-rfc-style)
        entry: "bash -c 'nixfmt --check \"$@\" || (echo \"Run: nix fmt\"; exit 1)' --"
        language: system
        files: \.nix$
        types: [file]

      - id: nix-statix
        name: Nix linting (statix)
        entry: statix check
        language: system
        files: \.nix$
        types: [file]
        pass_filenames: false

      - id: nix-deadnix
        name: Nix dead code (deadnix)
        entry: deadnix -L --fail
        language: system
        files: \.nix$
        types: [file]
        pass_filenames: false

  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.22.0
    hooks:
      - id: zizmor
        args: ['--persona=regular', '--min-severity=medium', '--min-confidence=medium']
